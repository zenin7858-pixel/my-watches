<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - TimeLux Watches</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
        }

        /* Navigation Bar */
        header {
            background-color: #111111;
            color: #ffffff;
            padding: 20px 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #d4af37;
            text-decoration: none;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active {
            color: #d4af37;
        }

        .cart-btn {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .cart-badge {
            background-color: #ff3b30;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 8px;
            font-weight: bold;
        }

        /* Filter Section */
        .filter-container {
            max-width: 1200px;
            margin: 30px auto 10px;
            padding: 0 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filter-container select {
            padding: 10px 15px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: white;
            cursor: pointer;
            outline: none;
        }

        /* Products Grid */
        .shop-section {
            padding: 20px 4% 60px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-bottom: 1px solid #f0f0f0;
        }

        .product-info {
            padding: 20px;
            text-align: center;
        }

        .product-info h3 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #111;
        }

        .product-info .price {
            font-size: 16px;
            color: #d4af37;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .buy-btn {
            background-color: #111;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: background-color 0.3s;
        }

        .buy-btn:hover {
            background-color: #d4af37;
        }

        footer {
            background-color: #111;
            color: #888;
            text-align: center;
            padding: 30px 20px;
            font-size: 14px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">TimeLux</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html" class="active">Shop</a>
            <a href="index.html#about">About</a>
            <a href="index.html#contact">Contact</a>
        </nav>
        <a href="cart.html" class="cart-btn">
            Cart <span class="cart-badge" id="cart-count">0</span>
        </a>
    </header>

    <div class="filter-container">
        <h2>Our Exclusive Collection</h2>
        <div>
            <label for="priceFilter">Sort By: </label>
            <select id="priceFilter" onchange="filterProducts()">
                <option value="all">All Watches</option>
                <option value="low">Price: Low to High</option>
                <option value="high">Price: High to Low
<div class="product-list">
    <div class="product">
        <h3>Luxury Watch</h3>
        <p>Price: $100</p>
        <button onclick="addToCart('Luxury Watch', '100')">Add to Cart</button>
    </div>
</div>
                    <script>
    function addToCart(productName, price) {
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        cart.push({ name: productName, price: price });
        localStorage.setItem('myCart', JSON.stringify(cart));
        alert(productName + " has been added to your cart!");
    }
</script>
